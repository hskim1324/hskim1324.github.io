baseURL: https://hskim1324.github.io/
languageCode: en-us
title: Hoseok Kim
theme: PaperMod

paginate: 10

services:
  googleAnalytics:
    id: G-SQVKVZBEEK

params:
  env: production
  description: "Hoseok Kim - Ph.D. Student at Purdue University"
  author: Hoseok Kim

  # Profile mode for homepage
  profileMode:
    enabled: true
    title: Hoseok Kim
    subtitle: |
      Ph.D. Student @ [Purdue University](https://www.purdue.edu)
      Advised by Prof. Vijay Raghunathan

      Researching energy-efficient edge computing and NPU architecture.
    imageUrl: img/profile.jpg
    imageWidth: 150
    imageHeight: 150
    imageTitle: Hoseok Kim
    buttons:
      - name: Publications
        url: /publications/
      - name: Blog
        url: /blog/
      - name: CV
        url: /cv/

  # Social icons on homepage
  socialIcons:
    - name: github
      url: https://github.com/hskim1324
    - name: linkedin
      url: https://www.linkedin.com/in/hoseok-kim-03a6352b0
    - name: googlescholar
      url: https://scholar.google.com/citations?user=qc6CJjYAAAAJ
    - name: email
      url: mailto:kim5396@purdue.edu

  # Dark mode
  defaultTheme: auto
  disableThemeToggle: false

  # Search
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys:
      - title
      - permalink
      - summary
      - content

  # Show reading time, share buttons, breadcrumbs
  showReadingTime: true
  showShareButtons: false
  showBreadCrumbs: true
  showPostNavLinks: true
  showCodeCopyButtons: true

  # Cover image defaults
  cover:
    linkFullImages: true
    responsiveImages: true

  # Assets
  assets:
    disableFingerprinting: false

menu:
  main:
    - identifier: about
      name: About
      url: /
      weight: 10
    - identifier: publications
      name: Publications
      url: /publications/
      weight: 20
    - identifier: blog
      name: Blog
      url: /blog/
      weight: 30
    - identifier: cv
      name: CV
      url: /cv/
      weight: 40
    - identifier: search
      name: Search
      url: /search/
      weight: 50

outputs:
  home:
    - HTML
    - RSS
    - JSON

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
