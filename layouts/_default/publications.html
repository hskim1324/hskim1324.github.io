{{- define "main" }}

<article class="post-single">
  <header class="post-header">
    <h1 class="post-title">{{ .Title }}</h1>
    <div style="margin-top: 0.3rem;">
      <a href="https://scholar.google.com/citations?user=pMuWdL8AAAAJ&hl=en" target="_blank" rel="noopener noreferrer" style="font-size: 0.8rem; color: var(--secondary); text-decoration: none;">
        Google Scholar &#8599;
      </a>
    </div>
  </header>

  {{- if .Content }}
  <div class="post-content">
    {{- if not (.Param "disableAnchoredHeadings") }}
    {{- partial "anchored_headings.html" .Content -}}
    {{- else }}{{ .Content }}{{ end }}
  </div>
  {{- end }}
</article>

{{- end }}
